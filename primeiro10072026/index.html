<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: A Ordem no Caos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/style.css">
    <script src="https://kit.fontawesome.com/3f21966000.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="ui-title">Cadastro de Usuário</div>

    <div class="canvas" id="canvas">
        <div class=" ui-avatar"><i class="fa-solid fa-circle-user"></i></div>

        <!-- Textos -->

        <div class="item-solto ui-subtitle">Preencha os dados de acesso do sistema</div>

        <!-- Inputs bagunçados (posições inline para simular o caos) -->
        <div class=" ui-input-group">
            <div class="ui-label">Nome Completo</div>
            <div class="ui-input"></div> <!-- Erro proposital de tamanho -->
        </div>

        <div class=" ui-input-group">
            <div class="ui-label">E-mail Corporativo</div>
            <div class="ui-input"></div> <!-- Erro proposital de altura -->
        </div>

        <div class=" ui-input-group">
            <div class="ui-label">Senha de Acesso</div>
            <div class="ui-input"></div> <!-- Erro proposital de borda -->
        </div>

        <!-- Botões e Imagem -->
        <div class=" ui-btn-primary">SALVAR USUÁRIO</div>
        <div class=" ui-btn-secondary">Cancelar Operação</div>

    </div>
</body>

</html>
