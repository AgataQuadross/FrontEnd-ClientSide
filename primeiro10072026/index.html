<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio: A Ordem no Caos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://kit.fontawesome.com/3f21966000.js" crossorigin="anonymous"></script>
</head>

<body>

    <h3 class="ui-title centro">Cadastro de Usuário</h3>

    <form class="canvas centro" id="canvas">

        <img src="assets/img/mis botitas.jpg" class="ui-avatar">


        <p class="ui-subtitle">Preencha os dados de acesso do sistema</p>

        <label for="nome" class="ui-label canto">Nome Completo</label>
        <input id="nome" class="ui-input canto">

        <label for="email" class="ui-label canto">E-mail Corporativo</label>
        <input id="email" class="ui-input canto">

        <label for="senha" class="ui-label canto">Senha de Acesso</label>
        <input id="senha" class="ui-input canto">


        <!-- Botões e Imagem -->
        <button class="ui-btn-primary botao">SALVAR USUÁRIO</button>
        <button class="ui-btn-secondary botao">Cancelar Operação</button>

    </form>
</body>

</html>
