<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good-Musik</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://kit.fontawesome.com/3f21966000.js" crossorigin="anonymous"></script>
</head>

<body>

    <main>
        <section class="centro">
            <img class="foto" src="assets/img/download (5).jpg" alt="coelhinho escutando musica">
        </section>
        
        <!-- tempo -->
        <section class="centro">
            <input type="range" class="barra-progreco" min="0" max="177" value="90">

        </section>
        <div class="temporizador centro">
            <span>1:00</span>
            <span>-1:27</span>
        </div>
        <!-- controlador -->
        <section class="centro">
            <button class="btn"><i class="fa-solid fa-backward"></i></button><!-- volta -->
            <button class="btn btn-main"><i class="fa-solid fa-play"></i> <i
                    class="fa-solid fa-pause"></i></button><!-- play/pause -->
            <button class="btn"><i class="fa-solid fa-forward"></i></button><!-- pula -->
        </section>

    </main>

    <script src="assets/js/funcianalidades.js"></script>
</body>

</html>
